name: Cleanup All Workflow Runs

on:
  workflow_dispatch: # Chạy thủ công khi bạn muốn

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all workflow runs
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_TRIGGER_PAT }}
        run: |
          echo "🧹 Đang quét toàn bộ các workflow runs..."
          
          # Lấy danh sách ID của tất cả các lần chạy (runs)
          # --limit 1000: Bạn có thể tăng số này lên nếu có hàng ngàn lượt chạy
          RUNS=$(gh run list --limit 1000 --json databaseId -q '.[].databaseId')

          if [ -z "$RUNS" ]; then
            echo "✅ Không tìm thấy lượt chạy nào để xóa."
            exit 0
          fi

          echo "🗑️ Đang xóa các lượt chạy..."
          for RUN_ID in $RUNS; do
            # Chúng ta dùng "|| true" để nếu có lỗi (ví dụ chính nó đang chạy) thì script vẫn tiếp tục
            gh run delete $RUN_ID || true
          done

          echo "✅ Đã dọn dẹp xong toàn bộ lịch sử."
