name: Cleanup All Workflow Runs

on:
  workflow_dispatch: 

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all workflow runs
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_TRIGGER_PAT }}
          # Thay thế bằng username và tên repo của bạn
          REPO: "${{ github.repository }}" 
        run: |
          echo "🧹 Đang quét toàn bộ các workflow runs trong $REPO..."
          
          # Thêm flag -R $REPO để chỉ định rõ repository cho GitHub CLI
          RUNS=$(gh run list -R "$REPO" --limit 1000 --json databaseId -q '.[].databaseId')

          if [ -z "$RUNS" ]; then
            echo "✅ Không tìm thấy lượt chạy nào để xóa."
            exit 0
          fi

          echo "🗑️ Đang xóa các lượt chạy..."
          for RUN_ID in $RUNS; do
            # Thêm -R $REPO ở đây nữa để lệnh delete biết xóa ở đâu
            gh run delete -R "$REPO" "$RUN_ID" || true
          done

          echo "✅ Đã dọn dẹp xong toàn bộ lịch sử."
