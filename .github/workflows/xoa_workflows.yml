name: Cleanup All Workflow Runs

on:
  workflow_dispatch: 

# Cấp quyền ghi trực tiếp cho Workflow
permissions:
  actions: write
  contents: read

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all workflow runs
        env:
          # Thử dùng GITHUB_TOKEN mặc định trước, nếu vẫn muốn dùng PAT thì thay lại bên dưới
          GH_TOKEN: ${{ github.token }} 
          REPO: "${{ github.repository }}"
        run: |
          echo "🧹 Đang quét các bản chạy tại $REPO..."
          
          # Lấy danh sách ID (trừ bản đang chạy hiện tại để tránh xung đột)
          RUNS=$(gh run list -R "$REPO" --limit 1000 --json databaseId,status -q '.[] | select(.status != "in_progress") | .databaseId')

          if [ -z "$RUNS" ]; then
            echo "✅ Không có gì để xóa."
            exit 0
          fi

          for RUN_ID in $RUNS; do
            echo "🗑️ Đang xóa ID: $RUN_ID"
            gh run delete -R "$REPO" "$RUN_ID" || true
          done
          
          echo "✅ Xong!"
