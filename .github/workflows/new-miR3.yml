name: Xiaomi MiR3 NEW

on:
  # Cho phép kích hoạt qua API (giữ nguyên)
  repository_dispatch:
  
  # Cho phép kích hoạt thủ công
  workflow_dispatch:
    inputs:
      ssh:
        description: 'Enable SSH connection to Actions? (Check to enable)'
        required: false
        type: boolean    # Thay đổi từ string sang boolean để có checkbox
        default: false   # Kiểu boolean không cần dấu ngoặc kép
env:
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config-mir3
  # PATCHES_PATH: patches
  DIY_P1_SH: new-diy.sh
  DIY_P2_SH: diy-part2.sh
  #by default used .config for build from repo
  #if your repo not contain .config, you may download it from direct url setting by ALT_CONFIG_URL variable
  #if ALT_CONFIG_URL commented and repo not contain .config - use default for mt7620
  #.config from repo > .config from url > default .config
  ALT_CONFIG_URL: false
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: true
  TZ: Asia/Ho_Chi_Minh
  FILE_DATE: _$(date +"%Y%m%d%H%M") # Thêm dòng này để đánh dấu thời gian build
  DEVICE_NAME: Xiaomi-R3           # Đặt tên thiết bị ở đây để dùng cho Release Tag
 
jobs:
          
  build:
    runs-on: ubuntu-latest
    steps:
# --- STEP DỌN DẸP THÊM VÀO ĐÂY ---
    - name: Cleanup old runs
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh run list --workflow "${{ github.workflow }}" --limit 100 --json databaseId,status -q '.[] | select(.status != "in_progress") | .databaseId' | xargs -I {} gh run delete {} || true
# --- CÁC STEP BUILD CỦA BẠN TIẾP TỤC TỪ ĐÂY ---
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '24' # Sử dụng bản LTS để ổn định nhất
        
    - name: Install BATS
      run: |
        npm install -g bats
        echo "BATS_VERSION=$(bats -v)" >> $GITHUB_STEP_SUMMARY # Đưa thông tin vào bản tóm tắt log
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        # added zstd and python3-setuptools for better compatibility
        sudo -E apt-get -qq install build-essential clang flex g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-setuptools python3-dev python3-pip rsync unzip zlib1g-dev file wget ccache zstd
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$(id -gn) /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        # 1. Hiển thị dung lượng đĩa gọn gàng hơn
        echo "Disk space before cloning:"
        df -hT . | awk 'NR==1 || NR==2'

        # 2. Clone nông (shallow clone) để tiết kiệm thời gian và bộ nhớ
        # --single-branch giúp chỉ lấy duy nhất 1 nhánh cần thiết
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt

        # 3. Tạo symlink và kiểm tra kết quả
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        
        # 4. Hiển thị thông tin tóm tắt để debug
        echo "Source code cloned to: $(realpath openwrt)"
    - name: Cache
      uses: actions/cache@v4
      with:
        # Using absolute paths for reliability
        path: |
          /workdir/openwrt/dl
          /home/runner/.ccache
        key: ${{ runner.os }}-build-${{ env.REPO_BRANCH }}-${{ hashFiles(env.CONFIG_FILE) }}
        restore-keys: |
          ${{ runner.os }}-build-${{ env.REPO_BRANCH }}-

    - name: Configure ccache
      run: |
        ccache --set-config=cache_dir=/home/runner/.ccache
        ccache --set-config=max_size=2G
        ccache --set-config=compression=true
        ccache -z # Clear statistics for a clean log of this specific build

    - name: Load custom feeds
      run: |
        [ -e "$FEEDS_CONF" ] && mv "$FEEDS_CONF" openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH
        # Cập nhật và cài đặt feeds
        ./scripts/feeds update -a
        ./scripts/feeds install -a

        # --- BẮT ĐẦU SỬA LỖI RECURSIVE & MISSING DEPENDENCY ---
        echo "Breaking Python3 recursive dependency loop..."
        
        # Tìm chính xác file Makefile của Python3 base
        # Lệnh này sẽ xóa '+python3-email' khỏi 'python3-urllib' VÀ ngược lại
        # Chúng ta dùng đường dẫn rộng để đảm bảo trúng đích trong thư mục feeds
        find feeds/packages/lang/python/python3/ -name "Makefile" -exec sed -i 's/+python3-urllib//g' {} +
        find feeds/packages/lang/python/python3/ -name "Makefile" -exec sed -i 's/+python3-email//g' {} +

        echo "Fixing OnionShare-CLI dependencies..."
        # Sửa lỗi thiếu python3-pysocks/python3-unidecode của OnionShare
        # Vì bạn dùng MiWiFi Mini 16MB, tốt nhất là xóa các phụ thuộc này để build trôi
        ONION_MAKEFILE="package/feeds/packages/onionshare-cli/Makefile"
        if [ -f "$ONION_MAKEFILE" ]; then
          sed -i 's/+python3-pysocks//g' "$ONION_MAKEFILE"
          sed -i 's/+python3-unidecode//g' "$ONION_MAKEFILE"
          sed -i 's/+python3-socks//g' "$ONION_MAKEFILE"
        fi

        # 2. BƯỚC QUAN TRỌNG NHẤT: Xóa sạch thư mục tmp và các file config tạm
        # Nếu không xóa cái này, OpenWrt sẽ liên tục báo lỗi cũ từ bộ nhớ đệm
        rm -rf tmp/
        rm -f .config*
        
        # 3. Cài đặt lại feeds để cập nhật các thay đổi vừa sed vào hệ thống
        ./scripts/feeds install -a
        
        # --- KẾT THÚC SỬA LỖI ---
        
    - name: Load custom configuration
      run: |
        [ -d files ] && mv files openwrt/files
        
        # Logic chọn file cấu hình linh hoạt hơn
        if [ -f "$CONFIG_FILE" ]; then
            cp "$CONFIG_FILE" openwrt/.config
            echo "✅ Using .config from repository"
        elif [ -n "$ALT_CONFIG_URL" ]; then
            curl -fsSL "$ALT_CONFIG_URL" -o openwrt/.config
            echo "📥 Downloaded .config from URL"
            
            # Kiểm tra nội dung file thay vì đếm ký tự cứng nhắc
            if ! grep -q "CONFIG_TARGET" openwrt/.config; then
                echo "⚠️ Invalid .config downloaded, fallback to mt7620"
                cp openwrt/feeds/x/rom/lede/config.ramips-mt7620 openwrt/.config
            fi
        else
            cp openwrt/feeds/x/rom/lede/config.ramips-mt7620 openwrt/.config
            echo "ℹ️ Using default mt7620 config"
        fi

        # Thực thi script tùy chỉnh P2
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        make defconfig

    - name: SSH connection to Actions
      uses: P3TERX/ssh2actions@main # Dùng @main để cập nhật các bản vá tmate mới nhất
      if: (github.event.inputs.ssh == 'true' || github.event.inputs.ssh == true)
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        
    # - name: Telegram notification
    #   uses: appleboy/telegram-action@master
    #   if: always() # Chạy kể cả khi build lỗi để bạn biết mà kiểm tra
    #   with:
    #     to: ${{ secrets.TELEGRAM_CHAT_ID }}
    #     token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    #     message: |
    #       🚀 Build OpenWrt xong rồi!
    #       📱 Thiết bị: ${{ env.DEVICE_NAME }}
    #       🌿 Nhánh: ${{ env.REPO_BRANCH }}
    #       📊 Trạng thái: ${{ job.status }}
    #       🔗 Xem tại: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Cache DL directory
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: ${{ runner.os }}-openwrt-dl-${{ hashFiles('**/feeds.conf.default') }}-${{ hashFiles('**/.config*') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-dl-

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        # Tải mã nguồn và tự động thử lại nếu lỗi
        make download -j$(nproc) || make download -j$(nproc) || make download -j1 V=s
        
        # Dọn dẹp file lỗi gọn gàng hơn
        find dl -size -1024c -delete
        echo "status=success" >> $GITHUB_OUTPUT
  
    - name: Read config target
      run: |
        # Xác định file cấu hình: Ưu tiên file đã copy vào openwrt/.config, 
        # nếu chưa có thì đọc trực tiếp từ file gốc $CONFIG_FILE
        if [ -f "openwrt/.config" ]; then
          CONF_SOURCE="openwrt/.config"
        elif [ -f "$CONFIG_FILE" ]; then
          CONF_SOURCE="$CONFIG_FILE"
        else
          echo "❌ Error: Cannot find any config file (.config or $CONFIG_FILE)"
          exit 1
        fi

        echo "Reading from: $CONF_SOURCE"
        
        # Trích xuất dòng chứa thông tin Device
        CONF_LINE=$(grep '^CONFIG_TARGET.*DEVICE.*=y' "$CONF_SOURCE" | head -n 1)

        if [ -n "$CONF_LINE" ]; then
          # Tách 3 thành phần: Arch, CPU, Device
          ARCH=$(echo "$CONF_LINE" | sed -r 's/^CONFIG_TARGET_(.*)_(.*)_DEVICE_(.*)=y/\1/')
          CPU=$(echo "$CONF_LINE" | sed -r 's/^CONFIG_TARGET_(.*)_(.*)_DEVICE_(.*)=y/\2/')
          DEVICE=$(echo "$CONF_LINE" | sed -r 's/^CONFIG_TARGET_(.*)_(.*)_DEVICE_(.*)=y/\3/')

          # Lưu vào môi trường GitHub
          echo "ARCH_NAME=$ARCH" >> $GITHUB_ENV
          echo "CPU_NAME=$CPU" >> $GITHUB_ENV
          echo "DEVICE_NAME=$DEVICE" >> $GITHUB_ENV
          
          # Hiển thị log để kiểm tra
          echo -e "✅ Target Detected:\n  - Arch: $ARCH\n  - CPU: $CPU\n  - Device: $DEVICE"
        else
          echo "❌ Error: Config target line not found in $CONF_SOURCE"
          exit 1
        fi
    
    - name: Compile firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        # Hiển thị trạng thái cache trước khi build
        ccache -s
        # Thực hiện biên dịch với tham số CCACHE=1
        # Thêm IGNORE_ERRORS=1 nếu bạn muốn bỏ qua một số lỗi cảnh báo nhỏ
        make -j$(nproc) CCACHE=1 || make -j1 CCACHE=1 || make -j1 V=s CCACHE=1
        
        # Hiển thị thống kê sau khi build (để biết bao nhiêu % được lấy từ cache)
        ccache -s
        echo "status=success" >> $GITHUB_OUTPUT
        # Lấy tên thiết bị để đặt tên file sau này
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: always() # Luôn chạy để kiểm soát tài nguyên
      run: |
        echo "Disk space usage after build:"
        df -hT .

    - name: Upload bin directory
      uses: actions/upload-artifact@v4 # Cố định phiên bản v4 ổn định
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        # Tên file rõ ràng hơn: openwrt_bin_Xiaomi-R3_20260403
        name: openwrt_bin_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
        path: openwrt/bin
        # Tối ưu: Chỉ giữ lại 7 ngày thay vì 90 ngày mặc định để tiết kiệm dung lượng tài khoản
        retention-days: 7
        # Tối ưu: Nén mức độ cao để tải lên nhanh hơn
        compression-level: 9

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        # Di chuyển vào thư mục chứa firmware
        cd openwrt/bin/targets/*/*
        # Xóa các file bổ trợ không cần thiết để file zip tải về sạch hơn
        rm -rf packages config.buildinfo feeds.buildinfo version.buildinfo
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4 # Cố định v4 để ổn định
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        # Thêm dấu gạch dưới để tên file rõ ràng: openwrt_firmware_xiaomi_r3_20240520
        name: openwrt_firmware_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
        retention-days: 7 # Tối ưu: Chỉ giữ file trong 7 ngày để tiết kiệm dung lượng kho lưu trữ

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        # Tạo tag tên thiết bị + ngày tháng
        TAG_NAME="${{ env.DEVICE_NAME }}_$(date +"%Y%m%d")"
        echo "release_tag=$TAG_NAME" >> $GITHUB_OUTPUT
        
        # Tạo nội dung mô tả (Release Note)
        {
          echo "### 📦 OpenWrt Firmware - ${{ env.DEVICE_NAME }}"
          echo "* **Branch:** ${{ env.REPO_BRANCH }}"
          echo "* **Build Date:** $(date +"%Y-%m-%d %H:%M")"
          echo "* **Architecture:** ${{ env.ARCH_NAME }}"
          echo "* **CPU Model:** ${{ env.CPU_NAME }}"
          echo "---"
          # Chèn link tải ngoài nếu có
          [ "${{ env.UPLOAD_COWTRANSFER }}" = "true" ] && echo "🔗 [Cowtransfer](${{ steps.cowtransfer.outputs.url }})"
          [ "${{ env.UPLOAD_WETRANSFER }}" = "true" ] && echo "🔗 [WeTransfer](${{ steps.wetransfer.outputs.url }})"
        } > release.txt
        
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        # Tải lên tất cả các file image (thường là .bin, .trx)
        files: ${{ env.FIRMWARE }}/*
        token: ${{ secrets.GITHUB_TOKEN }}
        # Tùy chọn: Đánh dấu là bản phát hành mới nhất
        make_latest: true
        
  clean:
    name: Clean up old assets
    runs-on: ubuntu-latest
    # Chỉ cấp quyền vừa đủ để dọn dẹp
    permissions:
      actions: write
      contents: write
            
    steps:
      # Tối ưu 1: Sử dụng action phổ biến và ổn định hơn
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 1

      # Tối ưu 2: Kiểm tra điều kiện môi trường gọn hơn
      - name: Remove old Releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        # Sử dụng syntax gọn hơn cho điều kiện
        if: ${{ env.UPLOAD_RELEASE == 'true' }}
        with:
          keep_latest: 10
          delete_tags: true
        env:
          # Thay PAT bằng GITHUB_TOKEN mặc định nếu có thể
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  notify:
    name: Telegram notification
    runs-on: ubuntu-latest
    if: always()
    needs: [build, clean] # Chờ cả 2 job build và clean xong mới chạy
    steps:
      - name: Send Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀 Toàn bộ quy trình đã xong!
            📱 Thiết bị: ${{ env.DEVICE_NAME }}
            🌿 Nhánh: ${{ env.REPO_BRANCH }}
            📊 Kết quả Build: ${{ needs.build.result }}
            🧹 Kết quả Clean: ${{ needs.clean.result }}
            🔗 Xem tại: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
